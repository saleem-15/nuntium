name: "Dev Deploy to Firebase"

on:
  push:
    branches:
      - dev

jobs:
  deploy_dev:
    name: Build & Distribute Dev APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v1-${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            v1-${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Inject Secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
        shell: bash

      - name: Generate Code (build_runner)
        run: dart run build_runner build -d

      - name: Build Dev APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Inject Service Account Key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > service-account.json
        shell: bash

      - name: Upload to Firebase App Distribution
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ vars.FIREBASE_APP_ID_ANDROID }}" \
            --groups "testers" \
            --release-notes "Dev Commit: ${{ github.event.head_commit.message }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
