name: "Dev Deploy to Firebase"

on:
  push:
    branches:
      - dev

jobs:
  deploy_dev:
    name: Build & Distribute Dev APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v1-${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            v1-${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Inject Secrets
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
        shell: bash

      - name: Cache Build Runner
        uses: actions/cache@v5
        with:
          path: .dart_tool/build
          key: build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}-
            build-runner-${{ runner.os }}-

      - name: Generate Code (build_runner)
        run: dart run build_runner build -d

      - name: Build Dev APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ vars.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Dev Commit: ${{ github.event.head_commit.message }}"
