name: "Production Release"

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release_main:
    name: Build & Release Prod APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v1-${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            v1-${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Inject Secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
        shell: bash

      - name: Generate Code (build_runner)
        run: dart run build_runner build -d

      - name: Run Quality Checks
        run: |
          flutter analyze
          flutter test

      - name: Build Obfuscated APK
        run: |
          flutter build apk --release --target-platform android-arm64 --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Inject Service Account Key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > service-account.json
        shell: bash

      - name: Upload Crashlytics Symbols
        run: |
          npm install -g firebase-tools
          firebase crashlytics:symbols:upload --app="${{ vars.FIREBASE_APP_ID_ANDROID }}" build/app/outputs/symbols
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json

      - name: Extract Version
        id: extract_version
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          echo "VERSION=$version" >> $GITHUB_ENV
        shell: bash

      - name: Check/Modify Tag
        id: tag_logic
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "VERSION=$VERSION-build-${{ github.run_number }}" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            ## Nuntium Automated Build 🚀
            - **Target:** Modern 64-bit devices (arm64-v8a)
            - **Build Number:** ${{ github.run_number }}
            - **Commit Message:** ${{ github.event.head_commit.message }}
            - **Status:** Unsigned (For testing purposes)
          token: ${{ secrets.GITHUB_TOKEN }}
